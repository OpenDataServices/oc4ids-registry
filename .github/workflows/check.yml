name: Check
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
        architecture: x64
    - run: pip install datatig
    - run: python -m datatig.cli check .

