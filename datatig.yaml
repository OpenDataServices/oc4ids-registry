title: OC4IDS register
description: Register for https://standard.open-contracting.org/infrastructure/latest/en/
githost:
  type: github
  url: OpenDataServices/oc4ids-registry
  primary_branch: live
types:
- id: dataset
  directory: dataset
  fields:
  - id: url
    key: url
    title: URL
    type: url
  - id: license_title
    key: license_title
    title: License Title (if custom)
    description: If the license title is not a common one defined in license_url, then set it here.
  - id: country
    key: country
    title: Country
    description: Country of publisher, ISO 2 letter code.
  - id: portal_title
    key: portal_title
    title: Portal Title
    description: Title of portal.
  - id: portal_url
    key: portal_url
    title: Portal URL
    type: url
    description: URL of portal.
  list_fields:
  - url
  - license_title
  - country
  default_format: yaml
- id: license
  directory: license
  fields:
  - id: title
    key: title
    title: Human readable title
  - id: title_short
    key: title_short
    title: Human readable title (Short)
  - id: urls
    key: urls
    title: URLs
    type: list-dictionaries
    fields:
    - id: url
      key: url
      title: URL
      type: url
  list_fields:
  - title
  - title_short
  - urls
  default_format: yaml
